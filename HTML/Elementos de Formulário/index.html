<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Formulário</title>
</head>
<body>
    <h1>Elementos de Formulário</h1>
    <p>Os elementos de formulário em HTML permitem coletar dados do usuário (como login, cadastro, pesquisa, etc.)</p>


    <form action="" method="">
       <fieldset>
            <legend>Contato</legend>
       

        <label for="nome">Nome:</label>
        <input id="nome" name="nome" type="text" required><br>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required><br>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required><br>
        
        </fieldset>
        <fieldset>
            <button type="submit">Enviar</button>
        </fieldset>
    </form> 

</body> 
</html>
