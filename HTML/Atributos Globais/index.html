<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos Globais</title>
    <style>
        #mensagem {
            color:blueviolet
        }
        .destaque{
            color:red;
        }
        body {
            background-color: bisque;
        }
    </style>
</head>
<body>
    <h1>Atributos Globais</h1>
    
    <!-- id - Identificador Único -->
     <p id="mensagem">Olá, mundo</p>
     
     <!-- class (Classe) - Permite agrupar vários elementos com o mesmo 
      estilo e comportamento. -->

      <p class="destaque">Texto importante</p>
      <p class="destaque">Outro texto importante</p>

      <!-- style (estilo inline) - Aplica CSS direto no elemento -->
       <h1 style="color:blue;">Título azul</h1>
</body>
</html>
