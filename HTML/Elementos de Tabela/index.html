<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Tabela</title>
</head>
<body>
    <h1>Elementos de Tabela</h1>
    <p>Os Elementos de Tabela em HTML são usados para organizar dados em linhas e colunas, como uma planilha</p>

    <table border="1">
       <caption>Tabela de Produtos</caption>
       <thead>
         <tr>
             <th>Produto</th>
             <th>Preço</th>
         </tr>
    </thead>
    <tbody>
          <tr>
             <td>Teclado</td>
             <td>R$ 80,00</td>
          </tr>
    </tbody>
    <tfoot>
       <tr>
        <td>Total</td>
        <td>100,00</td>
       </tr>
    </tfoot>
   </table>
</body>
</html>
