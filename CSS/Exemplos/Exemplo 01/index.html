<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello World</title>
    <style>
        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex; 

            /* Centraliza horizontalmente o conteúdo */
            justify-content: center; 

            /* Centraliza verticalmente o conteúdo */
            align-items: center;

            /* Define altura como 100% da altura da tela */
            height: 100vh;

            /* Cor de fundo cinza claro */
            background-color: whitesmoke;

            /* Define a fonte do texto */
            font-family: Arial sans-serif
        }

        /* Estilos aplicados ao título (h1) */
        h1 {
            /* cor do texto */
            color:black;

            /* Tamanho da fonte (3 vezes o tamanho padrão) */
          font-size: 3rem;
            /* Barra azul ao redor */
          border: 3px solid blueviolet;
        }
    </style>
</head>
<body>
    <!-- Texto exibido no navegador-->
     <h1>Hello World</h1>
</body>
</html>
